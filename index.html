<!DOCTYPE html>
<html lang="uk">
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Благодійний фонд Петра Скрипки</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #222;
  line-height: 1.7;
}

.top-banner {
  width: 100%;
  height: 300px;
  object-fit: cover;
  object-position: bottom;
  display: block;
}

/* КНОПКА МЕНЮ */
.menu-toggle {
  position: fixed;
  top: 15px;
  left: 15px;
  width: 52px;
  height: 52px;
  border: none;
  border-radius: 12px;
  background: #16324a;
  color: white;
  font-size: 30px;
  cursor: pointer;
  z-index: 100001;
}

/* МЕНЮ */
.side-menu {
  position: fixed;
  top: 75px;
  left: 15px;
  width: 240px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.18);
  padding: 12px 0;
  display: none;
}

.side-menu.show {
  display: block;
}

.side-menu a {
  display: block;
  padding: 14px 18px;
  text-decoration: none;
  color: #16324a;
  font-weight: bold;
}

/* ВІДСТУПИ ТЕКСТУ */
.intro, section, .socials {
  padding: 32px 60px;
}

@media (max-width: 768px) {
  .intro, section, .socials {
    padding: 20px;
  }
}

/* ІКОНКИ */
.socials {
  text-align: center;
}

.socials a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 55px;
  height: 55px;
  margin: 10px;
  border-radius: 50%;
  background: #1d3557;
  color: white;
  font-size: 22px;
  text-decoration: none;
}

footer {
  text-align: center;
  padding: 20px;
  background: #1d3557;
  color: white;
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<div class="side-menu" id="sideMenu">
  <a href="#about">Про фонд</a>
  <a href="#help">Як допомогти</a>
  <a href="#contacts">Контакти</a>
</div>

<img src="logo.jpg" class="top-banner">

<div class="intro">
  <p>Я — Петро Скрипка, ветеран та засновник благодійного фонду.</p>
</div>

<section id="about">
  <h2>Про фонд</h2>
  <p>Ми допомагаємо військовим та цивільним.</p>
</section>

<section id="help">
  <h2>Як допомогти</h2>
  <a href="https://send.monobank.ua/jar/6qpTzTDwDe">Підтримати фонд</a>
</section>

<!-- ІКОНКИ ВНИЗУ -->
<div class="socials" id="contacts">
  <a href="https://www.facebook.com/share/18Ny33b7tr/" target="_blank">
    <i class="fab fa-facebook-f"></i>
  </a>

  <a href="https://www.tiktok.com/@marafondobra_p_s" target="_blank">
    <i class="fab fa-tiktok"></i>
  </a>

  <a href="https://www.instagram.com/petro__skrypka" target="_blank">
    <i class="fab fa-instagram"></i>
  </a>

  <a href="https://t.me/PetroSkrypka911" target="_blank">
    <i class="fab fa-telegram"></i>
  </a>
</div>

<footer>
  Благодійний фонд Петра Скрипки © 2026
</footer>

<script>
function toggleMenu() {
  document.getElementById("sideMenu").classList.toggle("show");
}
</script>

</body>
</html>
